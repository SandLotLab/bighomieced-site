<!-- Navigation Highlight Script (runs after footer) -->
<script>
window.addEventListener("DOMContentLoaded", function() {
  const path = window.location.pathname.toLowerCase();

  const navMap = [
    { selector: 'a.pill[href="/"]', match: p => p === "/" },
    { selector: 'a.pill[href="/about.html"]', match: p => p === "/about.html" },
    { selector: 'a.pill[href="/privacy.html"]', match: p => p === "/privacy.html" },
    { selector: 'a.pill[href="/terms.html"]', match: p => p === "/terms.html" },
    { selector: 'a.pill[href="/blog/"]', match: p => p.startsWith("/blog/") },
    { selector: 'a.pill[href="/projects/"]', match: p => p.startsWith("/projects/") },
    { selector: 'a.pill[href="/diagrams/"]', match: p => p.startsWith("/diagrams/") }
  ];

  navMap.forEach(item => {
    const el = document.querySelector(item.selector);
    if (el && item.match(path)) {
      el.classList.add("active");
    }
  });
});
</script>
